<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css">
</head>
<body>
<div class="card">
  <h1>Login</h1>

  <div class="field">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
    <div class="error-msg" id="username-error">Please enter your username.</div>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
    <div class="error-msg" id="password-error">Please enter your password.</div>
  </div>

  <button class="btn-login" id="loginBtn" onclick="handleLogin()">
    <span id="btn-text">Login</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <p class="signup">I don't have a account?<a href="#" onclick="handleSignUp(event)">sign up</a></p>
</div>

<div class="toast" id="toast"></div>

<script src="login.js"></script>

</body>
</html>
